name: Jules Dependency Upgrade

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

concurrency:
  group: jules-dependency-upgrade
  cancel-in-progress: false

jobs:
  start:
    name: Start dependency upgrade session
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      JULES_API_ENDPOINT: ${{ vars.JULES_API_ENDPOINT }}
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
      TARGET_REPO: oaslananka/kicad-mcp-pro
      STARTING_BRANCH: main
    steps:
      - name: Check configuration
        run: |
          set -Eeuo pipefail
          if [ -z "${JULES_API_ENDPOINT:-}" ] || [ -z "${JULES_API_KEY:-}" ]; then
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              echo "::error::Set JULES_API_ENDPOINT variable and JULES_API_KEY secret before manual use."
              exit 1
            fi
            echo "Jules API is not configured; scheduled dependency upgrade is skipped."
            exit 0
          fi

      - name: Start dependency upgrade task
        if: env.JULES_API_ENDPOINT != '' && env.JULES_API_KEY != ''
        run: |
          set -Eeuo pipefail
          python - <<'PY' > /tmp/jules-payload.json
          import json
          import os

          prompt = """Perform a safe dependency upgrade for this repository.

          Requirements:
          - Detect package managers and lockfiles automatically.
          - Update lockfiles consistently.
          - Prefer patch/minor updates first.
          - For major upgrades, document required code/config migrations and leave them for review.
          - Run: corepack enable; corepack npm ci; uv sync --all-extras --frozen.
          - Run: corepack npm run metadata:check; corepack npm run release:check; corepack npm run compat:check.
          - Run: corepack npm run format:check; corepack npm run lint; corepack npm run typecheck.
          - Run: corepack npm run test; corepack npm run security; corepack npm run workflows:lint; corepack npm run workflows:security; corepack npm run build.
          - Open or update a PR with exact commands run, failures fixed, and remaining risks.
          - Do not relax coverage, lint, type, workflow, or security gates.
          """
          payload = {
              "sourceContext": {
                  "source": os.environ["TARGET_REPO"],
                  "startingBranch": os.environ["STARTING_BRANCH"],
              },
              "prompt": prompt,
              "automationMode": "AUTO_CREATE_PR",
          }
          print(json.dumps(payload))
          PY

          curl -fsS -X POST -H "Accept: application/json" -H "Content-Type: application/json" -H "X-Goog-Api-Key: ${JULES_API_KEY}" "${JULES_API_ENDPOINT}" --data @/tmp/jules-payload.json | tee jules-response.json
