name: Branch hygiene report

on:
  schedule:
    - cron: "0 7 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: read

concurrency:
  group: branch-hygiene-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  report:
    if: github.repository == 'oaslananka/kicad-mcp-pro'
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Generate report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python scripts/branch_hygiene_report.py --repo "${{ github.repository }}" > hygiene-report.md

      - name: Write report summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cat hygiene-report.md >> "${GITHUB_STEP_SUMMARY}"
