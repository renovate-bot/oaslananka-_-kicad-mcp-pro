name: Jules Task

on:
  workflow_dispatch:
    inputs:
      repo:
        description: Repository slug Jules should work on.
        required: true
        default: oaslananka/kicad-mcp-pro
        type: string
      branch:
        description: Starting branch or ref.
        required: false
        default: main
        type: string
      prompt:
        description: Task prompt for Jules.
        required: true
        type: string
      auto_create_pr:
        description: Ask Jules to create or update a PR.
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: jules-task-${{ github.event.inputs.repo }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  start:
    name: Start Jules session
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      JULES_API_ENDPOINT: ${{ vars.JULES_API_ENDPOINT }}
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
      TASK_REPO: ${{ github.event.inputs.repo }}
      TASK_BRANCH: ${{ github.event.inputs.branch }}
      TASK_PROMPT: ${{ github.event.inputs.prompt }}
      AUTO_CREATE_PR: ${{ github.event.inputs.auto_create_pr }}
    steps:
      - name: Validate Jules configuration
        run: |
          set -Eeuo pipefail
          if [ -z "${JULES_API_ENDPOINT:-}" ]; then
            echo "::error::Set repository variable JULES_API_ENDPOINT to the Jules session API endpoint."
            exit 1
          fi
          if [ -z "${JULES_API_KEY:-}" ]; then
            echo "::error::Set repository secret JULES_API_KEY."
            exit 1
          fi

      - name: Start task
        run: |
          set -Eeuo pipefail
          python - <<'PY' > /tmp/jules-payload.json
          import json
          import os

          payload = {
              "sourceContext": {
                  "source": os.environ["TASK_REPO"],
                  "startingBranch": os.environ.get("TASK_BRANCH") or "main",
              },
              "prompt": os.environ["TASK_PROMPT"],
              "automationMode": "AUTO_CREATE_PR" if os.environ.get("AUTO_CREATE_PR") == "true" else "MANUAL",
          }
          print(json.dumps(payload))
          PY

          curl -fsS -X POST -H "Accept: application/json" -H "Content-Type: application/json" -H "X-Goog-Api-Key: ${JULES_API_KEY}" "${JULES_API_ENDPOINT}" --data @/tmp/jules-payload.json | tee jules-response.json
          echo "Jules response saved to jules-response.json"
