name: Trigger org mirror sync

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    name: Trigger canonical sync on org
    if: github.repository == 'oaslananka/kicad-mcp-pro'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch repository_dispatch to org
        env:
          TOKEN: ${{ secrets.ORG_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN}" ]; then
            echo "::error::ORG_SYNC_TOKEN is required."
            exit 1
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/oaslananka-lab/kicad-mcp-pro/dispatches" \
            -d '{"event_type":"canonical-push"}'
