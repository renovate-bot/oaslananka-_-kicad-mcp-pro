name: KiCad CLI Smoke

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
defaults:
  run:
    shell: bash

jobs:
  smoke-test:
    name: KiCad 10 CLI Smoke
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 45
    env:
      HUSKY: 0
      KICAD_SMOKE_ARTIFACTS: artifacts/kicad-cli-smoke
      KICAD_APPIMAGE_URL: https://mirrors.mit.edu/kicad/appimage/stable/kicad-10.0.2-x86_64-lite.AppImage.tar
      KICAD_APPIMAGE_SHA256: 8d2a2731bab2174aa71d2692834eb3cc17d3663605b4c55cd75b59711969df76

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install KiCad 10 from official AppImage
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl file libfuse2 libgl1 libglib2.0-0
          install -d "${RUNNER_TEMP}/kicad-appimage" "${RUNNER_TEMP}/kicad-extract"
          curl -fsSL "${KICAD_APPIMAGE_URL}" -o "${RUNNER_TEMP}/kicad.AppImage.tar"
          printf '%s  %s\n' "${KICAD_APPIMAGE_SHA256}" "${RUNNER_TEMP}/kicad.AppImage.tar" | sha256sum -c -
          tar -xf "${RUNNER_TEMP}/kicad.AppImage.tar" -C "${RUNNER_TEMP}/kicad-appimage"
          appimage="$(find "${RUNNER_TEMP}/kicad-appimage" -maxdepth 1 -type f -name '*.AppImage' | head -n 1)"
          test -n "${appimage}"
          chmod +x "${appimage}"
          (
            cd "${RUNNER_TEMP}/kicad-extract"
            "${appimage}" --appimage-extract >/dev/null
          )
          cli="${RUNNER_TEMP}/kicad-extract/squashfs-root/usr/bin/kicad-cli"
          test -x "${cli}"
          "${cli}" version
          echo "KICAD_MCP_KICAD_CLI=${cli}" >> "${GITHUB_ENV}"
          echo "${RUNNER_TEMP}/kicad-extract/squashfs-root/usr/bin" >> "${GITHUB_PATH}"

      - name: Install project dependencies
        run: |
          corepack enable
          corepack pnpm install --frozen-lockfile
          uv sync --all-extras --frozen

      - name: Run real KiCad CLI smoke tests
        run: |
          mkdir -p "${KICAD_SMOKE_ARTIFACTS}"
          uv run python -m pytest tests/integration/test_kicad_cli_smoke.py \
            -q \
            --junitxml="${KICAD_SMOKE_ARTIFACTS}/pytest-report.xml"

      - name: Collect KiCad smoke diagnostics
        if: always()
        run: |
          mkdir -p "${KICAD_SMOKE_ARTIFACTS}"
          {
            echo "KICAD_MCP_KICAD_CLI=${KICAD_MCP_KICAD_CLI:-}"
            if [ -n "${KICAD_MCP_KICAD_CLI:-}" ] && [ -x "${KICAD_MCP_KICAD_CLI}" ]; then
              if ! "${KICAD_MCP_KICAD_CLI}" version; then
                echo "kicad-cli version check failed after tests completed."
              fi
            fi
          } > "${KICAD_SMOKE_ARTIFACTS}/kicad-cli-diagnostics.log" 2>&1

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.4.0
        with:
          name: kicad-cli-smoke-logs
          path: |
            artifacts/kicad-cli-smoke/
            /tmp/pytest-of-runner/
          if-no-files-found: warn
