name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Org CI (Python ${{ matrix.python-version }})
    if: github.repository_owner == 'oaslananka-lab' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Explain execution mode
        run: |
          echo "Automatic GitHub CI/CD is owned by oaslananka-lab."
          echo "Personal GitHub, Azure DevOps, and GitLab are manual fallback surfaces."
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-extras --python ${{ matrix.python-version }}
      - run: uv run --python ${{ matrix.python-version }} ruff check src/ tests/
      - run: uv run --python ${{ matrix.python-version }} python -m mypy src/kicad_mcp/
      - run: uv run --python ${{ matrix.python-version }} python -m pytest tests/unit/ tests/integration/ tests/e2e/ -q --cov=kicad_mcp --cov-report=term-missing --cov-fail-under=70
