name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Org CI (Python ${{ matrix.python-version }})
    if: github.repository_owner == 'oaslananka-lab' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Explain execution mode
        run: |
          echo "Automatic GitHub CI/CD is owned by oaslananka-lab."
          echo "Personal GitHub, Azure DevOps, and GitLab are manual fallback surfaces."
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: corepack enable
      - run: corepack npm ci
      - run: uv sync --all-extras --frozen --python ${{ matrix.python-version }}
      - run: corepack npm run check:ci
