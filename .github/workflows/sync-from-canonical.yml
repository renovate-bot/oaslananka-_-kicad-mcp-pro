name: Sync from canonical

on:
  push:
    branches: ["**"]
    tags: ["**"]
  delete:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types:
      - canonical-push

permissions:
  contents: write

concurrency:
  group: sync-from-canonical
  cancel-in-progress: false

jobs:
  mirror-on-canonical-change:
    if: github.repository == 'oaslananka/kicad-mcp-pro'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout canonical
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push canonical refs to org mirror
        env:
          MIRROR_TOKEN: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}
        run: |
          set -euo pipefail
          git remote add org "https://x-access-token:${MIRROR_TOKEN}@github.com/oaslananka-lab/kicad-mcp-pro.git"

          if [ "${{ github.event_name }}" = "delete" ]; then
            ref_name="${{ github.event.ref }}"
            ref_type="${{ github.event.ref_type }}"
            if [ "$ref_type" = "branch" ]; then
              case "$ref_name" in
                gh-pages|release-please--branches--main)
                  echo "Skipping org-managed branch deletion: $ref_name"
                  ;;
                *)
                  git push org --delete "$ref_name" || true
                  ;;
              esac
            elif [ "$ref_type" = "tag" ]; then
              git push org --delete "refs/tags/$ref_name" || true
            fi
            exit 0
          fi

          git fetch origin '+refs/heads/*:refs/heads/*' --tags
          for ref in $(git for-each-ref --format='%(refname)' refs/heads); do
            branch="${ref#refs/heads/}"
            if [ "$branch" = "main" ]; then
              git push org "$ref:refs/heads/$branch"
            else
              git push org "$ref:refs/heads/$branch" --force
            fi
          done
          git push org --tags --force

  scheduled-reconcile:
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro' && github.event_name != 'push' && github.event_name != 'delete'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout org mirror
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}

      - name: Pull from canonical and replay
        env:
          MIRROR_TOKEN: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "oaslananka-lab[bot]"
          git config user.email "oaslananka-lab@users.noreply.github.com"

          git remote add canonical "https://x-access-token:${MIRROR_TOKEN}@github.com/oaslananka/kicad-mcp-pro.git"
          git fetch canonical --prune --tags

          for ref in $(git for-each-ref --format='%(refname:short)' refs/remotes/canonical | sed 's|^canonical/||'); do
            case "$ref" in
              HEAD|canonical)
                continue
                ;;
            esac
            if [ "$ref" = "main" ]; then
              git push origin "refs/remotes/canonical/${ref}:refs/heads/${ref}"
            else
              git push origin "refs/remotes/canonical/${ref}:refs/heads/${ref}" --force
            fi
          done

          git push origin --tags --force

          for org_branch in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin); do
            short="${org_branch#origin/}"
            case "$short" in
              HEAD|gh-pages|release-please--branches--main)
                continue
                ;;
            esac
            if ! git show-ref --verify --quiet "refs/remotes/canonical/${short}"; then
              git push origin --delete "$short" || true
            fi
          done
