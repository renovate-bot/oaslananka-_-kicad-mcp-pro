name: Mutation Testing

on:
  schedule:
    - cron: "25 6 1 * *"
  workflow_dispatch:

jobs:
  mutmut:
    name: Mutation Testing
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --frozen
      - name: Run scoped mutation baseline
        continue-on-error: true
        run: >
          uv run mutmut run
          --paths-to-mutate src/kicad_mcp/utils,src/kicad_mcp/discovery.py,src/kicad_mcp/connection.py,src/kicad_mcp/tools/router.py
      - name: Export mutation results
        if: always()
        run: uv run mutmut results > mutmut-results.txt || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: mutmut-results
          path: mutmut-results.txt
          retention-days: 30
