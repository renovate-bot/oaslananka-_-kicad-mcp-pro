name: Docker Publish

on:
  release:
    types:
      - published

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: oaslananka-lab/kicad-mcp-pro
  IMAGE_DESCRIPTION: "KiCad MCP Pro - Model Context Protocol server for KiCad EDA workflows"
  MCP_SERVER_NAME: io.github.oaslananka-lab/kicad-mcp-pro

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build image
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      RELEASE_REF: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_REF }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          context: git
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}},value=${{ env.RELEASE_REF }}
            type=raw,value=latest,enable=${{ !contains(env.RELEASE_REF, '-') }}
          labels: |
            org.opencontainers.image.source=https://github.com/oaslananka-lab/kicad-mcp-pro
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ env.RELEASE_REF }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.modelcontextprotocol.server.name=${{ env.MCP_SERVER_NAME }}
          annotations: |
            org.opencontainers.image.source=https://github.com/oaslananka-lab/kicad-mcp-pro
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ env.RELEASE_REF }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.modelcontextprotocol.server.name=${{ env.MCP_SERVER_NAME }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest

      - name: Build image without push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}

  publish:
    name: Publish image
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs:
      - build
    environment: release
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    env:
      RELEASE_REF: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_REF }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          context: git
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}},value=${{ env.RELEASE_REF }}
            type=raw,value=latest,enable=${{ !contains(env.RELEASE_REF, '-') }}
          labels: |
            org.opencontainers.image.source=https://github.com/oaslananka-lab/kicad-mcp-pro
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ env.RELEASE_REF }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.modelcontextprotocol.server.name=${{ env.MCP_SERVER_NAME }}
          annotations: |
            org.opencontainers.image.source=https://github.com/oaslananka-lab/kicad-mcp-pro
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ env.RELEASE_REF }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.modelcontextprotocol.server.name=${{ env.MCP_SERVER_NAME }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest

      - name: Build and push image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: false
          sbom: false

      - name: Attest image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
