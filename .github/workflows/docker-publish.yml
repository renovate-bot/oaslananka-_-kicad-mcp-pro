name: Docker Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: oaslananka/kicad-mcp-pro
  IMAGE_DESCRIPTION: "KiCad MCP Pro - Model Context Protocol server for KiCad EDA workflows"
  MCP_SERVER_NAME: io.github.oaslananka/kicad-mcp-pro

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
defaults:
  run:
    shell: bash

jobs:
  resolve-release-ref:
    name: Resolve release ref
    if: github.repository == 'oaslananka/kicad-mcp-pro'
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      release_ref: ${{ steps.release.outputs.release_ref }}
    steps:
      - name: Resolve release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "release" ]; then
            release_ref="${EVENT_RELEASE_TAG}"
          else
            release_ref="$(gh release view --repo "${GITHUB_REPOSITORY}" --json tagName --jq '.tagName')"
          fi
          if [[ "${release_ref}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_ref=${release_ref}" >> "${GITHUB_OUTPUT}"
          else
            echo "::error::Resolved release ref is not a SemVer tag: ${release_ref}"
            exit 1
          fi

  build:
    name: Build image
    if: github.repository == 'oaslananka/kicad-mcp-pro'
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30
    needs:
      - resolve-release-ref
    permissions:
      contents: read
    env:
      RELEASE_REF: ${{ needs.resolve-release-ref.outputs.release_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_REF }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Resolve checked-out revision
        id: release-meta
        run: |
          set -euo pipefail
          echo "revision=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          context: git
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}},value=${{ env.RELEASE_REF }}
          labels: |
            org.opencontainers.image.source=https://github.com/oaslananka/kicad-mcp-pro
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ env.RELEASE_REF }}
            org.opencontainers.image.revision=${{ steps.release-meta.outputs.revision }}
            io.modelcontextprotocol.server.name=${{ env.MCP_SERVER_NAME }}
          annotations: |
            org.opencontainers.image.source=https://github.com/oaslananka/kicad-mcp-pro
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ env.RELEASE_REF }}
            org.opencontainers.image.revision=${{ steps.release-meta.outputs.revision }}
            io.modelcontextprotocol.server.name=${{ env.MCP_SERVER_NAME }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest

      - name: Build image without push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}

  publish:
    name: Publish image
    if: github.repository == 'oaslananka/kicad-mcp-pro'
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30
    needs:
      - resolve-release-ref
      - build
    environment: release
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    env:
      RELEASE_REF: ${{ needs.resolve-release-ref.outputs.release_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_REF }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve checked-out revision
        id: release-meta
        run: |
          set -euo pipefail
          echo "revision=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          context: git
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}},value=${{ env.RELEASE_REF }}
          labels: |
            org.opencontainers.image.source=https://github.com/oaslananka/kicad-mcp-pro
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ env.RELEASE_REF }}
            org.opencontainers.image.revision=${{ steps.release-meta.outputs.revision }}
            io.modelcontextprotocol.server.name=${{ env.MCP_SERVER_NAME }}
          annotations: |
            org.opencontainers.image.source=https://github.com/oaslananka/kicad-mcp-pro
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ env.RELEASE_REF }}
            org.opencontainers.image.revision=${{ steps.release-meta.outputs.revision }}
            io.modelcontextprotocol.server.name=${{ env.MCP_SERVER_NAME }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest

      - name: Build and push image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: false
          sbom: false

      - name: Attest image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
