name: Mirror canonical repo to personal showcase

on:
  push:
    branches:
      - main
      - gh-pages
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: mirror-personal-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  mirror:
    name: Mirror protected refs
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout canonical repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Mirror fast-forward refs
        env:
          PERSONAL_REPO_PUSH_TOKEN: ${{ secrets.PERSONAL_REPO_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PERSONAL_REPO_PUSH_TOKEN}" ]; then
            echo "::error::PERSONAL_REPO_PUSH_TOKEN is required."
            exit 1
          fi

          git remote add personal \
            "https://x-access-token:${PERSONAL_REPO_PUSH_TOKEN}@github.com/oaslananka/kicad-mcp-pro.git"
          git fetch origin --tags --prune
          git fetch personal --tags --prune

          if [[ "${GITHUB_REF}" == refs/heads/main || "${GITHUB_REF}" == refs/heads/gh-pages ]]; then
            branch="${GITHUB_REF_NAME}"
            git fetch origin "+refs/heads/${branch}:refs/remotes/origin/${branch}" --prune
            if git ls-remote --exit-code --heads personal "${branch}" >/dev/null 2>&1; then
              git fetch personal "+refs/heads/${branch}:refs/remotes/personal/${branch}" --prune
              personal_ref="refs/remotes/personal/${branch}"
            else
              personal_ref=""
            fi

            if [ -z "${personal_ref}" ]; then
              git push personal "refs/remotes/origin/${branch}:refs/heads/${branch}"
            elif git diff --quiet "${personal_ref}" "refs/remotes/origin/${branch}" -- .; then
              echo "Personal ${branch} already matches organization content."
            elif git merge-base --is-ancestor "${personal_ref}" "refs/remotes/origin/${branch}"; then
              git push personal "refs/remotes/origin/${branch}:refs/heads/${branch}"
            else
              echo "::notice::Personal ${branch} history diverges; publishing a content mirror commit."
              worktree="$(mktemp -d)"
              trap 'rm -rf "${worktree}"' EXIT
              git worktree add --detach "${worktree}" "${personal_ref}"
              git -C "${worktree}" config user.name "github-actions[bot]"
              git -C "${worktree}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git -C "${worktree}" read-tree --reset -u "refs/remotes/origin/${branch}"
              git -C "${worktree}" commit -m "Mirror organization ${branch} ${GITHUB_SHA:0:12}"
              git -C "${worktree}" push personal "HEAD:refs/heads/${branch}"
            fi
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            existing="$(git ls-remote personal "refs/tags/${GITHUB_REF_NAME}" | awk '$2 !~ /\^\{\}$/ { print $1; exit }')"
            canonical="$(git rev-parse "refs/tags/${GITHUB_REF_NAME}")"
            if [ -n "${existing}" ] && [ "${existing}" != "${canonical}" ]; then
              echo "::error::Personal showcase tag ${GITHUB_REF_NAME} diverges from canonical."
              exit 1
            fi
            if [ -z "${existing}" ]; then
              git push personal "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
            fi
          fi
