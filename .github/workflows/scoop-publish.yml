name: Scoop Publish

on:
  release:
    types:
      - published

permissions:
  contents: read

env:
  BUCKET_REPO: oaslananka/scoop-bucket
  MANIFEST_PATH: bucket/kicad-mcp-pro.json

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
defaults:
  run:
    shell: bash

jobs:
  generate:
    name: Generate Scoop manifest
    if: github.repository == 'oaslananka/kicad-mcp-pro'
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Generate manifest
        env:
          VERSION: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          mkdir -p bucket
          python - <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path

          version = os.environ["VERSION"].removeprefix("v")
          url = f"https://pypi.org/pypi/kicad-mcp-pro/{version}/json"
          for attempt in range(1, 11):
              try:
                  with urllib.request.urlopen(url, timeout=30) as response:
                      payload = json.load(response)
                  break
              except urllib.error.HTTPError as error:
                  if error.code != 404 or attempt == 10:
                      raise
                  print(f"PyPI metadata for {version} not available yet; retrying in 30 s...")
                  time.sleep(30)
          wheel = next((url for url in payload["urls"] if url["packagetype"] == "bdist_wheel"), None)
          if wheel is None:
              raise SystemExit(f"No PyPI wheel found for kicad-mcp-pro {version}")
          cmd = (
              "@echo off\r\n"
              "set PYTHONPATH=%~dp0site;%PYTHONPATH%\r\n"
              "python -c \"from kicad_mcp.server import main; main()\" %*\r\n"
          )
          launcher = (
              "$cmd = @'\r\n"
              f"{cmd}"
              "'@; Set-Content \"$dir\\kicad-mcp-pro.cmd\" $cmd -Encoding ASCII"
          )
          manifest = {
              "version": version,
              "description": "Model Context Protocol server for KiCad EDA workflows.",
              "homepage": "https://github.com/oaslananka/kicad-mcp-pro",
              "license": "MIT",
              "depends": "python",
              "architecture": {
                  "64bit": {
                      "url": wheel["url"],
                      "hash": wheel["digests"]["sha256"],
                  }
              },
              "pre_install": [
                  f"python -m pip install --upgrade --target \"$dir\\site\" \"kicad-mcp-pro=={version}\"",
                  launcher,
              ],
              "bin": "kicad-mcp-pro.cmd",
              "checkver": {
                  "url": "https://pypi.org/pypi/kicad-mcp-pro/json",
                  "jsonpath": "$.info.version",
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": wheel["url"],
                      }
                  }
              },
          }
          Path("bucket/kicad-mcp-pro.json").write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          PY
      - name: Print generated manifest
        run: |
          set -euo pipefail
          cat bucket/kicad-mcp-pro.json

  publish:
    name: Create bucket PR
    if: github.repository == 'oaslananka/kicad-mcp-pro'
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20
    needs:
      - generate
    environment: release
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Validate bucket access
        env:
          GH_TOKEN: ${{ secrets.PACKAGE_MANAGER_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::PACKAGE_MANAGER_TOKEN is required to create a Scoop bucket PR."
            exit 1
          fi
          gh repo view "${BUCKET_REPO}" >/dev/null
      - name: Generate manifest
        env:
          VERSION: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          mkdir -p bucket
          python - <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path

          version = os.environ["VERSION"].removeprefix("v")
          url = f"https://pypi.org/pypi/kicad-mcp-pro/{version}/json"
          for attempt in range(1, 11):
              try:
                  with urllib.request.urlopen(url, timeout=30) as response:
                      payload = json.load(response)
                  break
              except urllib.error.HTTPError as error:
                  if error.code != 404 or attempt == 10:
                      raise
                  print(f"PyPI metadata for {version} not available yet; retrying in 30 s...")
                  time.sleep(30)
          wheel = next((url for url in payload["urls"] if url["packagetype"] == "bdist_wheel"), None)
          if wheel is None:
              raise SystemExit(f"No PyPI wheel found for kicad-mcp-pro {version}")
          cmd = (
              "@echo off\r\n"
              "set PYTHONPATH=%~dp0site;%PYTHONPATH%\r\n"
              "python -c \"from kicad_mcp.server import main; main()\" %*\r\n"
          )
          launcher = (
              "$cmd = @'\r\n"
              f"{cmd}"
              "'@; Set-Content \"$dir\\kicad-mcp-pro.cmd\" $cmd -Encoding ASCII"
          )
          manifest = {
              "version": version,
              "description": "Model Context Protocol server for KiCad EDA workflows.",
              "homepage": "https://github.com/oaslananka/kicad-mcp-pro",
              "license": "MIT",
              "depends": "python",
              "architecture": {"64bit": {"url": wheel["url"], "hash": wheel["digests"]["sha256"]}},
              "pre_install": [
                  f"python -m pip install --upgrade --target \"$dir\\site\" \"kicad-mcp-pro=={version}\"",
                  launcher,
              ],
              "bin": "kicad-mcp-pro.cmd",
              "checkver": {"url": "https://pypi.org/pypi/kicad-mcp-pro/json", "jsonpath": "$.info.version"},
              "autoupdate": {"architecture": {"64bit": {"url": wheel["url"]}}},
          }
          Path("bucket/kicad-mcp-pro.json").write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          PY
      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.PACKAGE_MANAGER_TOKEN }}
          VERSION: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          branch="kicad-mcp-pro-${VERSION#v}"
          gh repo clone "${BUCKET_REPO}" bucket-repo
          cd bucket-repo
          git checkout -b "${branch}"
          mkdir -p bucket
          cp "../${MANIFEST_PATH}" "${MANIFEST_PATH}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${MANIFEST_PATH}"
          git commit -m "kicad-mcp-pro ${VERSION#v}"
          git push --set-upstream origin "${branch}"
          gh pr create \
            --repo "${BUCKET_REPO}" \
            --head "${branch}" \
            --base main \
            --title "kicad-mcp-pro ${VERSION#v}" \
            --body "Updates the Scoop manifest for kicad-mcp-pro ${VERSION#v}."
