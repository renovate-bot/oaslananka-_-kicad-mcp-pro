name: Sync Labels

on:
  push:
    branches:
      - main
    paths:
      - .github/labels.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
defaults:
  run:
    shell: bash

jobs:
  sync:
    name: Sync Labels
    if: github.repository == 'oaslananka/kicad-mcp-pro'
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Apply label schema
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import json
          import pathlib
          import subprocess

          def parse_value(raw: str) -> str:
              value = raw.strip()
              if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
                  return value[1:-1]
              return value

          labels: list[dict[str, str]] = []
          current: dict[str, str] | None = None
          for line in pathlib.Path(".github/labels.yml").read_text(encoding="utf-8").splitlines():
              if not line.strip():
                  continue
              if line.startswith("- name:"):
                  if current is not None:
                      labels.append(current)
                  current = {"name": parse_value(line.split(":", 1)[1])}
                  continue
              if current is None or ":" not in line:
                  continue
              key, raw_value = line.strip().split(":", 1)
              current[key] = parse_value(raw_value)
          if current is not None:
              labels.append(current)

          existing_raw = subprocess.check_output(
              ["gh", "label", "list", "--limit", "1000", "--json", "name"],
              text=True,
              encoding="utf-8",
          )
          existing = {label["name"] for label in json.loads(existing_raw)}
          for label in labels:
              name = label["name"]
              color = label["color"].lstrip("#")
              description = label.get("description", "")
              if name in existing:
                  command = ["gh", "label", "edit", name, "--color", color, "--description", description]
              else:
                  command = ["gh", "label", "create", name, "--color", color, "--description", description]
              subprocess.run(command, check=True)
