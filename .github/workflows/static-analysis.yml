name: Static Analysis

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  merge_group:
  schedule:
    - cron: "10 6 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --frozen
      - name: Pyright
        continue-on-error: true
        run: uv run pyright
      - name: Vulture
        continue-on-error: true
        run: uv run vulture src tests --min-confidence 90
      - name: Radon complexity
        continue-on-error: true
        run: uv run radon cc src -s -n C
      - name: Interrogate docstring coverage
        continue-on-error: true
        run: uvx interrogate==1.7.0 src -c pyproject.toml
