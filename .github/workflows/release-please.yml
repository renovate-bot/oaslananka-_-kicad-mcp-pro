name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release-please:
    name: Release Please
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      sha: ${{ steps.release.outputs.sha }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Validate token
        env:
          RELEASE_TOKEN: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TOKEN}" ]; then
            echo "::error::DOPPLER_GITHUB_SERVICE_TOKEN is required."
            exit 1
          fi

      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          token: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout release automation workspace
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          token: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Sync generated release metadata
        env:
          GH_TOKEN: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}
          RELEASE_BRANCH: release-please--branches--main--components--kicad-mcp-pro
        run: |
          set -euo pipefail
          release_pr="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --state open \
            --head "${RELEASE_BRANCH}" \
            --json number \
            --jq '.[0].number // empty')"
          if [ -z "${release_pr}" ]; then
            echo "No open release pull request to sync."
            exit 0
          fi

          git fetch origin "refs/heads/${RELEASE_BRANCH}:refs/remotes/origin/${RELEASE_BRANCH}"
          git switch -C "${RELEASE_BRANCH}" "origin/${RELEASE_BRANCH}"
          uv run --all-extras python scripts/sync_mcp_metadata.py --write

          if git diff --quiet -- mcp.json server.json uv.lock; then
            echo "Generated release metadata already synchronized."
            exit 0
          fi

          git config user.name "Osman Aslan"
          git config user.email "169144131+oaslananka@users.noreply.github.com"
          git add mcp.json server.json uv.lock
          git commit -m "chore(release): sync generated metadata"
          git push \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${RELEASE_BRANCH}"

  publish:
    name: Build, publish, and attach release assets
    needs:
      - release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
      PACKAGE_VERSION: ${{ needs.release-please.outputs.version }}
      RELEASE_SHA: ${{ needs.release-please.outputs.sha }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ env.RELEASE_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: stable
          cache: false

      - name: Install workflow lint tools
        run: |
          set -euo pipefail
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"

      - name: Install dependencies
        run: |
          set -euo pipefail
          corepack enable
          corepack pnpm install --frozen-lockfile
          uv sync --all-extras --frozen --python 3.12

      - name: Verify release version
        run: |
          set -euo pipefail
          python - <<'PY'
          import tomllib
          from pathlib import Path

          expected = "${{ env.PACKAGE_VERSION }}"
          actual = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          if actual != expected:
              raise SystemExit(f"release-please version output {expected} does not match pyproject.toml {actual}")
          PY

      - name: Run release verification
        env:
          RELEASE_PLEASE_GENERATED_CHANGELOG: "true"
        run: |
          set -euo pipefail
          corepack pnpm run check:ci

      - name: Build distributions
        run: |
          set -euo pipefail
          corepack pnpm run build

      - name: Stage Python distributions for package index
        run: |
          set -euo pipefail
          rm -rf dist-pypi
          mkdir -p dist-pypi
          python - <<'PY'
          from pathlib import Path
          import shutil

          source = Path("dist")
          target = Path("dist-pypi")
          packages = sorted(source.glob("*.whl")) + sorted(source.glob("*.tar.gz"))
          if not packages:
              raise SystemExit("No Python wheel or source distribution found in dist/.")
          for package in packages:
              shutil.copy2(package, target / package.name)
          PY

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/bom.json
          upload-artifact: false

      - name: Calculate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum -- * > SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
            dist/bom.json
            dist/SHA256SUMS.txt

      - name: Clear project virtualenv for signing action
        run: |
          set -euo pipefail
          rm -rf .venv

      - name: Sign release artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc
        env:
          UV_NO_CONFIG: "1"
          UV_CACHE_DIR: ${{ runner.temp }}/sigstore-uv-cache
          UV_PYTHON: "3.14"
          UV_PYTHON_INSTALL_DIR: ${{ runner.temp }}/sigstore-uv-python-dir
          VIRTUAL_ENV: ""
        with:
          inputs: |
            dist/*.whl
            dist/*.tar.gz
            dist/bom.json
            dist/SHA256SUMS.txt
          upload-signing-artifacts: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist-pypi/
          skip-existing: true

      - name: Post-publish smoke check
        run: |
          set -euo pipefail
          smoke_root="$(mktemp -d)"
          export UV_CACHE_DIR="${smoke_root}/uv-cache"
          export UV_PROJECT_ENVIRONMENT="${smoke_root}/project-env"
          trap 'rm -rf "${smoke_root}"' EXIT
          for attempt in {1..10}; do
            rm -rf "${smoke_root}/tools" "${smoke_root}/project-env"
            export UV_TOOL_DIR="${smoke_root}/tools"
            if uv tool run --from "kicad-mcp-pro==${PACKAGE_VERSION}" kicad-mcp-pro --help &&
              uv tool run --from "kicad-mcp-pro==${PACKAGE_VERSION}" kicad-mcp-pro health --json &&
              uv run --no-project --with "kicad-mcp-pro==${PACKAGE_VERSION}" \
                python -c 'import kicad_mcp; print(kicad_mcp.__version__)'; then
              exit 0
            fi
            if [ "${attempt}" -lt 10 ]; then
              echo "Smoke check attempt ${attempt}/10 failed; retrying in 30 s..."
              sleep 30
            fi
          done
          echo "::error::Smoke check failed: kicad-mcp-pro ${PACKAGE_VERSION} was not available on PyPI after 10 attempts."
          exit 1

      - name: Attach assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release edit "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --draft=false

      - name: Mirror release to personal repository
        env:
          ORGANIZATION_GITHUB_TOKEN: ${{ github.token }}
          PERSONAL_REPO_PUSH_TOKEN: ${{ secrets.PERSONAL_REPO_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PERSONAL_REPO_PUSH_TOKEN}" ]; then
            echo "::error::PERSONAL_REPO_PUSH_TOKEN is required."
            exit 1
          fi

          git remote add personal \
            "https://x-access-token:${PERSONAL_REPO_PUSH_TOKEN}@github.com/oaslananka/kicad-mcp-pro.git"
          existing_tag="$(git ls-remote personal "refs/tags/${RELEASE_TAG}" | awk '$2 !~ /\^\{\}$/ { print $1; exit }')"
          organization_tag="$(git rev-parse "refs/tags/${RELEASE_TAG}")"
          if [ -n "${existing_tag}" ] && [ "${existing_tag}" != "${organization_tag}" ]; then
            echo "::error::Personal release tag ${RELEASE_TAG} diverges from organization tag."
            exit 1
          fi
          if [ -z "${existing_tag}" ]; then
            git push personal "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          fi

          notes_file="$(mktemp)"
          release_json="$(mktemp)"
          GH_TOKEN="${ORGANIZATION_GITHUB_TOKEN}" gh release view "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json name,body,isPrerelease > "${release_json}"
          jq -r '.body // ""' "${release_json}" > "${notes_file}"
          release_name="$(jq -r '.name // env.RELEASE_TAG' "${release_json}")"
          prerelease="$(jq -r '.isPrerelease' "${release_json}")"

          args=(--repo oaslananka/kicad-mcp-pro --title "${release_name}" --notes-file "${notes_file}")
          if [ "${prerelease}" = "true" ]; then
            args+=(--prerelease)
          fi

          if GH_TOKEN="${PERSONAL_REPO_PUSH_TOKEN}" gh release view "${RELEASE_TAG}" --repo oaslananka/kicad-mcp-pro >/dev/null 2>&1; then
            GH_TOKEN="${PERSONAL_REPO_PUSH_TOKEN}" gh release edit "${RELEASE_TAG}" "${args[@]}"
          else
            GH_TOKEN="${PERSONAL_REPO_PUSH_TOKEN}" gh release create "${RELEASE_TAG}" --verify-tag "${args[@]}"
          fi
          GH_TOKEN="${PERSONAL_REPO_PUSH_TOKEN}" gh release upload "${RELEASE_TAG}" dist/* --repo oaslananka/kicad-mcp-pro --clobber

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-dist-${{ env.RELEASE_TAG }}
          path: dist/
          retention-days: 14
