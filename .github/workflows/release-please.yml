name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to finish publishing.
        required: true
        default: v3.5.0
      release_sha:
        description: Commit SHA for the release tag.
        required: true
        default: 527aeb9a2b0ac9914c8454120787974f62bd4437

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release-please:
    name: Release Please
    if: github.repository == 'oaslananka/kicad-mcp-pro'
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 15
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      sha: ${{ steps.release.outputs.sha }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Validate token
        env:
          RELEASE_TOKEN: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TOKEN}" ]; then
            echo "::error::DOPPLER_GITHUB_SERVICE_TOKEN is required."
            exit 1
          fi

      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          token: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout release automation workspace
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          token: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Sync generated release metadata
        env:
          GH_TOKEN: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}
          RELEASE_BRANCH: release-please--branches--main--components--kicad-mcp-pro
        run: |
          set -euo pipefail
          release_pr="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --state open \
            --head "${RELEASE_BRANCH}" \
            --json number \
            --jq '.[0].number // empty')"
          if [ -z "${release_pr}" ]; then
            echo "No open release pull request to sync."
            exit 0
          fi

          git fetch origin "refs/heads/${RELEASE_BRANCH}:refs/remotes/origin/${RELEASE_BRANCH}"
          git switch -C "${RELEASE_BRANCH}" "origin/${RELEASE_BRANCH}"
          uv run --all-extras python scripts/sync_mcp_metadata.py --write

          if git diff --quiet -- src/kicad_mcp/__init__.py mcp.json server.json npm-wrapper/package.json uv.lock; then
            echo "Generated release metadata already synchronized."
            exit 0
          fi

          git config user.name "Osman Aslan"
          git config user.email "169144131+oaslananka@users.noreply.github.com"
          git add src/kicad_mcp/__init__.py mcp.json server.json npm-wrapper/package.json uv.lock
          git commit -m "chore(release): sync generated metadata"
          git push \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${RELEASE_BRANCH}"

  verify:
    name: Verify release source
    needs:
      - release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      PACKAGE_VERSION: ${{ needs.release-please.outputs.version || inputs.release_tag }}
      RELEASE_SHA: ${{ needs.release-please.outputs.sha || inputs.release_sha }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ env.RELEASE_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: stable
          cache: false

      - name: Install workflow lint tools
        run: |
          set -euo pipefail
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"

      - name: Install dependencies
        run: |
          set -euo pipefail
          corepack enable
          corepack pnpm install --frozen-lockfile
          uv sync --all-extras --frozen --python 3.12

      - name: Verify release version
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import tomllib
          from pathlib import Path

          expected = "${{ env.PACKAGE_VERSION }}".removeprefix("v")
          actual = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          if actual != expected:
              raise SystemExit(f"release-please version output {expected} does not match pyproject.toml {actual}")
          PY

      - name: Run release verification
        env:
          RELEASE_PLEASE_GENERATED_CHANGELOG: "true"
        run: |
          set -euo pipefail
          corepack pnpm run check:ci

  build-artifacts:
    name: Build release artifacts
    needs:
      - release-please
      - verify
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ needs.release-please.outputs.tag_name || inputs.release_tag }}
      RELEASE_SHA: ${{ needs.release-please.outputs.sha || inputs.release_sha }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ env.RELEASE_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --all-extras --frozen --python 3.12

      - name: Build distributions
        run: |
          set -euo pipefail
          uv build

      - name: Stage Python distributions for package index
        run: |
          set -euo pipefail
          rm -rf dist-pypi
          mkdir -p dist-pypi
          uv run python - <<'PY'
          from pathlib import Path
          import shutil

          source = Path("dist")
          target = Path("dist-pypi")
          packages = sorted(source.glob("*.whl")) + sorted(source.glob("*.tar.gz"))
          if not packages:
              raise SystemExit("No Python wheel or source distribution found in dist/.")
          for package in packages:
              shutil.copy2(package, target / package.name)
          PY

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/bom.json
          upload-artifact: false

      - name: Calculate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum -- * > SHA256SUMS.txt

      - name: Upload release distribution bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-dist-${{ env.RELEASE_TAG }}
          path: dist/
          retention-days: 14

      - name: Upload Python package bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pypi-dist-${{ env.RELEASE_TAG }}
          path: dist-pypi/
          retention-days: 14

  publish-provenance:
    name: Publish provenance attestations
    needs:
      - release-please
      - build-artifacts
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    environment: release
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      RELEASE_TAG: ${{ needs.release-please.outputs.tag_name || inputs.release_tag }}
    steps:
      - name: Download release distribution bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-dist-${{ env.RELEASE_TAG }}
          path: dist

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
            dist/bom.json
            dist/SHA256SUMS.txt

      - name: Clear project virtualenv for signing action
        run: |
          set -euo pipefail
          rm -rf .venv

      - name: Sign release artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc
        env:
          UV_NO_CONFIG: "1"
          UV_CACHE_DIR: ${{ runner.temp }}/sigstore-uv-cache
          UV_PYTHON: "3.14"
          UV_PYTHON_INSTALL_DIR: ${{ runner.temp }}/sigstore-uv-python-dir
          VIRTUAL_ENV: ""
        with:
          inputs: |
            dist/*.whl
            dist/*.tar.gz
            dist/bom.json
            dist/SHA256SUMS.txt
          upload-signing-artifacts: true

  publish-pypi:
    name: Publish Python package to PyPI
    needs:
      - release-please
      - build-artifacts
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20
    environment: release
    permissions:
      contents: read
      id-token: write
    env:
      PACKAGE_VERSION: ${{ needs.release-please.outputs.version || inputs.release_tag }}
      RELEASE_TAG: ${{ needs.release-please.outputs.tag_name || inputs.release_tag }}
    steps:
      - name: Download Python package bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: pypi-dist-${{ env.RELEASE_TAG }}
          path: dist-pypi

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist-pypi/
          skip-existing: true

      - name: Post-publish smoke check
        run: |
          set -euo pipefail
          PACKAGE_VERSION="${PACKAGE_VERSION#v}"
          smoke_root="$(mktemp -d)"
          export UV_CACHE_DIR="${smoke_root}/uv-cache"
          export UV_PROJECT_ENVIRONMENT="${smoke_root}/project-env"
          trap 'rm -rf "${smoke_root}"' EXIT
          for attempt in {1..10}; do
            rm -rf "${smoke_root}/tools" "${smoke_root}/project-env"
            export UV_TOOL_DIR="${smoke_root}/tools"
            if uv tool run --from "kicad-mcp-pro==${PACKAGE_VERSION}" kicad-mcp-pro --help &&
              uv tool run --from "kicad-mcp-pro==${PACKAGE_VERSION}" kicad-mcp-pro health --json &&
              uv run --no-project --with "kicad-mcp-pro==${PACKAGE_VERSION}" \
                python -c 'import kicad_mcp; print(kicad_mcp.__version__)'; then
              exit 0
            fi
            if [ "${attempt}" -lt 10 ]; then
              echo "Smoke check attempt ${attempt}/10 failed; retrying in 30 s..."
              sleep 30
            fi
          done
          echo "::error::Smoke check failed: kicad-mcp-pro ${PACKAGE_VERSION} was not available on PyPI after 10 attempts."
          exit 1

  attach-release-assets:
    name: Attach and publish GitHub Release assets
    needs:
      - release-please
      - publish-pypi
      - publish-provenance
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 15
    environment: release
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.release-please.outputs.tag_name || inputs.release_tag }}
      RELEASE_SHA: ${{ needs.release-please.outputs.sha || inputs.release_sha }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ env.RELEASE_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download release distribution bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-dist-${{ env.RELEASE_TAG }}
          path: dist

      - name: Attach assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release edit "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --draft=false

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-published-dist-${{ env.RELEASE_TAG }}
          path: dist/
          retention-days: 14
