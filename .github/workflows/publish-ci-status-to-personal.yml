name: Publish org CI status to personal repo

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA to update on the personal repository.
        required: true
        type: string
      state:
        description: GitHub commit status state.
        required: true
        default: success
        type: choice
        options:
          - success
          - failure
          - error
          - pending
      target_url:
        description: Optional URL to attach to the commit status.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: publish-ci-status-to-personal-${{ github.event.inputs.sha }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish mirrored CI status
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PERSONAL_REPO: oaslananka/kicad-mcp-pro
      STATUS_TOKEN: ${{ secrets.PERSONAL_REPO_STATUS_TOKEN }}
      INPUT_SHA: ${{ github.event.inputs.sha }}
      INPUT_STATE: ${{ github.event.inputs.state }}
      INPUT_TARGET_URL: ${{ github.event.inputs.target_url }}
    steps:
      - name: Publish commit status to personal source repo
        run: |
          set -Eeuo pipefail

          if [ -z "${STATUS_TOKEN:-}" ]; then
            echo "::error::PERSONAL_REPO_STATUS_TOKEN is required."
            exit 1
          fi

          sha="${INPUT_SHA:-}"
          state="${INPUT_STATE:-}"
          target_url="${INPUT_TARGET_URL:-}"

          if [ -z "$sha" ]; then
            echo "::error::sha input is required."
            exit 1
          fi

          if [ -z "$state" ]; then
            echo "::error::state input is required."
            exit 1
          fi

          STATE="$state" TARGET_URL="$target_url" python - <<'PY' > /tmp/status.json
          import json
          import os

          payload = {
              "state": os.environ["STATE"],
              "context": "org-mirror/ci",
              "description": "CI result from oaslananka-lab mirror",
              "target_url": os.environ.get("TARGET_URL", ""),
          }
          print(json.dumps(payload))
          PY

          curl -fsS -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${STATUS_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${PERSONAL_REPO}/statuses/${sha}" --data @/tmp/status.json
