name: Docker Lint

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
defaults:
  run:
    shell: bash

env:
  HADOLINT_IMAGE: ghcr.io/hadolint/hadolint@sha256:9259e253a4e299b50c92006149dd3a171c7ea3c5bd36f060022b5d2c1ff0fbbe

jobs:
  hadolint:
    name: Hadolint
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Lint Dockerfile
        run: docker run --rm -i "${HADOLINT_IMAGE}" hadolint --failure-threshold error - < Dockerfile
      - name: Lint Dockerfile.kicad10
        run: docker run --rm -i "${HADOLINT_IMAGE}" hadolint --failure-threshold error - < Dockerfile.kicad10

  compose:
    name: Compose Validation
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - run: docker compose config --quiet
        env:
          KICAD_MCP_AUTH_TOKEN: ci-compose-validation-token-00000000000000000000000000000000
