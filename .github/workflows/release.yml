name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example v3.0.3"
        required: true
      index:
        description: "Package index"
        type: choice
        default: "TestPyPI"
        options:
          - TestPyPI
          - PyPI
      publish:
        description: "Actually publish to registries"
        type: choice
        default: "false"
        options:
          - "false"
          - "true"
      approval:
        description: "Type APPROVE_RELEASE to confirm publishing"
        required: false

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: refs/tags/${{ inputs.version }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate approval
        env:
          RELEASE_PUBLISH: ${{ inputs.publish }}
          RELEASE_APPROVAL: ${{ inputs.approval }}
        run: |
          if [ "${RELEASE_PUBLISH}" = "true" ] && [ "${RELEASE_APPROVAL}" != "APPROVE_RELEASE" ]; then
            echo "Set approval=APPROVE_RELEASE to publish." >&2
            exit 1
          fi

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .node-version
          cache: npm

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@4819d808ab99e5cde19a0637a16536a4038fad73

      - name: Verify required secrets
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: bash scripts/verify_doppler_secrets.sh

      - name: Install dependencies
        run: |
          corepack enable
          corepack npm ci
          uv sync --all-extras --frozen

      - name: Test
        run: corepack npm run check:ci

      - name: Build
        run: corepack npm run build

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/bom.json
          upload-artifact: false

      - name: Calculate checksums
        run: |
          cd dist
          sha256sum -- * > SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
            dist/bom.json
            dist/SHA256SUMS.txt

      - name: Sign release artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc
        with:
          inputs: |
            dist/*.whl
            dist/*.tar.gz
            dist/bom.json
            dist/SHA256SUMS.txt
          upload-signing-artifacts: true

      - name: Publish
        if: inputs.publish == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          RELEASE_INDEX: ${{ inputs.index }}
        run: doppler run --project all --config main -- bash scripts/publish.sh

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-dist-${{ inputs.version }}
          path: dist/
          retention-days: 14

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_PUBLISH: ${{ inputs.publish }}
          RELEASE_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          target_sha="$(git rev-parse HEAD)"
          release_args=(
            --repo "${RELEASE_REPOSITORY}"
            --title "${RELEASE_VERSION}"
            --generate-notes
          )
          create_args=(
            "${release_args[@]}"
            --target "$target_sha"
          )
          if [ "${RELEASE_PUBLISH}" != "true" ]; then
            release_args+=(--draft)
            create_args+=(--draft)
          fi
          assets=()
          if compgen -G "dist/*" > /dev/null; then
            assets+=(dist/*)
          fi
          if gh release view "${RELEASE_VERSION}" --repo "${RELEASE_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_VERSION}" "${release_args[@]}"
            if [ "${#assets[@]}" -gt 0 ]; then
              gh release upload "${RELEASE_VERSION}" --repo "${RELEASE_REPOSITORY}" "${assets[@]}" --clobber
            fi
          else
            gh release create "${RELEASE_VERSION}" "${create_args[@]}" "${assets[@]}"
          fi
