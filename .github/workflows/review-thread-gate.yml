name: Review Thread Gate

on:
  pull_request_review:
  pull_request_review_comment:
  pull_request:
    types: [synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
defaults:
  run:
    shell: bash

jobs:
  thread-gate:
    name: Review Thread Gate
    if: >-
      github.repository == 'oaslananka/kicad-mcp-pro' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false)
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Check actionable review threads
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.review.pull_request.number || github.event.comment.pull_request_number }}
        run: |
          if [ -z "${PR_NUMBER:-}" ]; then
            echo 'No PR number found, skipping.'
            exit 0
          fi

          node scripts/check-review-threads.mjs \
            --repo "$GITHUB_REPOSITORY" \
            --pr "$PR_NUMBER" \
            --fail-on-blocked
