name: Review Thread Gate

on:
  pull_request_review:
  pull_request_review_comment:
  pull_request:
    types: [synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
defaults:
  run:
    shell: bash

jobs:
  thread-gate:
    name: Review Thread Gate
    if: >-
      github.repository == 'oaslananka/kicad-mcp-pro' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false)
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 5
    steps:
      - name: Check unresolved review threads
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request?.number
              ?? context.payload.review?.pull_request?.number
              ?? context.payload.comment?.pull_request_number;

            if (!prNumber) {
              core.info('No PR number found, skipping.');
              return;
            }

            // GitHub REST doesn't expose resolved state directly;
            // use GraphQL and paginate every review thread.
            const query = `
              query($owner: String!, $repo: String!, $pr: Int!, $after: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100, after: $after) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes { isResolved }
                    }
                  }
                }
              }
            `;

            const threads = [];
            let after = null;
            for (;;) {
              let result;
              try {
                result = await github.graphql(query, {
                  owner, repo, pr: prNumber, after
                });
              } catch (error) {
                const status = error.status ?? error.response?.status;
                if ([403, 404, 422].includes(status)) {
                  core.setFailed(
                    `GitHub review-thread query failed with ${status}: ${error.message}`
                  );
                  return;
                }
                throw error;
              }

              const reviewThreads = result.repository.pullRequest.reviewThreads;
              threads.push(...reviewThreads.nodes);
              if (!reviewThreads.pageInfo.hasNextPage) {
                break;
              }
              after = reviewThreads.pageInfo.endCursor;
            }

            const unresolved = threads.filter(t => !t.isResolved);

            if (unresolved.length > 0) {
              core.setFailed(
                `${unresolved.length} unresolved review thread(s). ` +
                `Resolve all threads before merging.`
              );
            } else {
              core.info(`All review threads resolved (${threads.length} total).`);
            }
