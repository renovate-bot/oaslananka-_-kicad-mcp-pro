name: Mirror releases back to canonical

on:
  release:
    types:
      - published
      - edited

permissions:
  contents: read

jobs:
  mirror-release:
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p assets
          gh release download "${RELEASE_TAG}" \
            --repo oaslananka-lab/kicad-mcp-pro --dir assets || true

      - name: Re-publish on canonical
        env:
          GH_TOKEN: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_TARGET: ${{ github.event.release.target_commitish }}
        run: |
          set -euo pipefail
          args=()
          if compgen -G "assets/*" > /dev/null; then
            args=(assets/*)
          fi
          gh release create "${RELEASE_TAG}" \
            --repo oaslananka/kicad-mcp-pro \
            --title "${RELEASE_NAME}" \
            --notes "${RELEASE_BODY}" \
            --target "${RELEASE_TARGET}" \
            "${args[@]}" \
          || if [ "${#args[@]}" -gt 0 ]; then
               gh release upload "${RELEASE_TAG}" \
                 --repo oaslananka/kicad-mcp-pro \
                 "${args[@]}" --clobber
             else
               gh release edit "${RELEASE_TAG}" \
                 --repo oaslananka/kicad-mcp-pro \
                 --title "${RELEASE_NAME}" \
                 --notes "${RELEASE_BODY}"
             fi
