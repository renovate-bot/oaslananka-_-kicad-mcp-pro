trigger: none
pr: none

parameters:
  - name: publishToPackageIndex
    displayName: Publish package from Azure DevOps
    type: boolean
    default: false
  - name: packageIndex
    displayName: Target package index
    type: string
    default: TestPyPI
    values:
      - TestPyPI
      - PyPI

variables:
  - group: pypi-credentials
  - name: pythonVersion
    value: "3.12"

stages:
  - stage: Validate
    displayName: Validate
    jobs:
      - job: ubuntu_validate
        displayName: Ubuntu · Ruff, mypy, pytest, and audit
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - script: python -m pip install --upgrade pip uv
            displayName: Install uv

          - script: uv sync --all-extras --python $(pythonVersion)
            displayName: Sync dependencies

          - script: uv run --python $(pythonVersion) ruff check src/ tests/
            displayName: Run ruff

          - script: uv run --python $(pythonVersion) python -m mypy src/kicad_mcp/
            displayName: Run mypy

          - script: >
              uv run --python $(pythonVersion)
              python -m pytest tests/unit/ tests/integration/ tests/e2e/ -q
              --cov=kicad_mcp --cov-report=term-missing --cov-fail-under=70
            displayName: Run pytest

          - script: >
              uv run --python $(pythonVersion)
              python -m pip_audit --skip-editable --progress-spinner off
            displayName: Run pip-audit

          - script: |
              set -euo pipefail
              if [ -n "${SAFETY_API_KEY:-}" ]; then
                set +e
                uv run --python $(pythonVersion) python -m safety \
                  --stage cicd \
                  --key "${SAFETY_API_KEY}" \
                  scan \
                  --target .
                safety_exit=$?
                set -e
                if [ "${safety_exit}" -ne 0 ]; then
                  echo "Safety scan could not complete cleanly (exit ${safety_exit}); pip-audit remains the enforced SCA gate for this pipeline."
                fi
              else
                echo "SAFETY_API_KEY is not set; pip-audit already ran as the enforced SCA gate."
              fi
            displayName: Run safety when configured
            env:
              SAFETY_API_KEY: $(SAFETY_API_KEY)

      - job: windows_validate
        displayName: Windows · Ruff, mypy, and unit tests
        pool:
          vmImage: windows-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - script: python -m pip install --upgrade pip uv
            displayName: Install uv

          - script: uv sync --all-extras --python $(pythonVersion)
            displayName: Sync dependencies

          - script: uv run --python $(pythonVersion) ruff check src/ tests/
            displayName: Run ruff

          - script: uv run --python $(pythonVersion) python -m mypy src/kicad_mcp/
            displayName: Run mypy

          - script: uv run --python $(pythonVersion) python -m pytest tests/unit/ -q
            displayName: Run unit tests

  - stage: Build
    displayName: Build
    dependsOn: Validate
    jobs:
      - job: package
        displayName: Build wheel and sdist
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - script: python -m pip install --upgrade pip uv
            displayName: Install uv

          - script: uv build
            displayName: Build package

          - publish: dist
            artifact: python-dist
            displayName: Publish build artifacts

  - stage: Publish
    displayName: Publish
    dependsOn: Build
    condition: and(succeeded(), eq('${{ parameters.publishToPackageIndex }}', 'true'))
    jobs:
      - job: publish_package
        displayName: Publish package
        pool:
          vmImage: ubuntu-latest
        steps:
          - download: current
            artifact: python-dist
            displayName: Download package artifacts

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - script: python -m pip install --upgrade pip twine
            displayName: Install twine

          - script: |
              set -euo pipefail

              if [ "${{ parameters.packageIndex }}" = "TestPyPI" ]; then
                python -m twine upload \
                  --repository-url https://test.pypi.org/legacy/ \
                  -u __token__ \
                  -p "$TEST_PYPI_TOKEN" \
                  --non-interactive \
                  --skip-existing \
                  "$(Pipeline.Workspace)/python-dist"/*
              else
                python -m twine upload \
                  -u __token__ \
                  -p "$PYPI_TOKEN" \
                  --non-interactive \
                  --skip-existing \
                  "$(Pipeline.Workspace)/python-dist"/*
              fi
            displayName: Publish distribution
            env:
              PYPI_TOKEN: $(PYPI_TOKEN)
              TEST_PYPI_TOKEN: $(TEST_PYPI_TOKEN)
