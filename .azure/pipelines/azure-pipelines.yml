# COMPATIBILITY STUB — Not the primary CI system.
# The canonical CI pipeline is .github/workflows/ci.yml.
# This file is maintained for teams that mirror this repo into Azure DevOps or GitLab.

trigger: none
pr: none

variables:
  - name: pythonVersion
    value: "3.12"
  - name: nodeVersion
    value: "24.15.0"

stages:
  - stage: Validate
    displayName: Validate
    jobs:
      - job: ubuntu_validate
        displayName: Ubuntu · Ruff, mypy, pytest, and audit
        pool:
          vmImage: ubuntu-24.04
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - task: NodeTool@0
            inputs:
              versionSpec: "$(nodeVersion)"
            displayName: Use Node.js

          - bash: |
              set -euo pipefail
              curl -LsSf https://astral.sh/uv/install.sh | sh
              echo "##vso[task.prependpath]$HOME/.local/bin"
              echo "##vso[task.prependpath]$HOME/.cargo/bin"
            displayName: Install uv

          - script: corepack enable
            displayName: Enable Corepack

          - script: corepack pnpm install --frozen-lockfile
            displayName: Install Node hook tooling

          - script: uv sync --all-extras --frozen --python $(pythonVersion)
            displayName: Sync dependencies

          - script: corepack pnpm run check:ci
            displayName: Run local validation gate

          - script: corepack pnpm run security:bandit
            displayName: Run Bandit

          - script: corepack pnpm run security:audit
            displayName: Run pip-audit

      - job: windows_validate
        displayName: Windows · Ruff, mypy, and unit tests
        pool:
          vmImage: windows-2022
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - task: NodeTool@0
            inputs:
              versionSpec: "$(nodeVersion)"
            displayName: Use Node.js

          - powershell: |
              $ErrorActionPreference = 'Stop'
              irm https://astral.sh/uv/install.ps1 | iex
              Write-Host "##vso[task.prependpath]$env:USERPROFILE\.local\bin"
            displayName: Install uv

          - script: corepack enable
            displayName: Enable Corepack

          - script: corepack pnpm install --frozen-lockfile
            displayName: Install Node hook tooling

          - script: uv sync --all-extras --frozen --python $(pythonVersion)
            displayName: Sync dependencies

          - script: corepack pnpm run lint
            displayName: Run ruff

          - script: corepack pnpm run typecheck
            displayName: Run mypy

          - script: corepack pnpm run test:unit
            displayName: Run unit tests

  - stage: Build
    displayName: Build
    dependsOn: Validate
    jobs:
      - job: package
        displayName: Build wheel and sdist
        pool:
          vmImage: ubuntu-24.04
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - task: NodeTool@0
            inputs:
              versionSpec: "$(nodeVersion)"
            displayName: Use Node.js

          - bash: |
              set -euo pipefail
              curl -LsSf https://astral.sh/uv/install.sh | sh
              echo "##vso[task.prependpath]$HOME/.local/bin"
              echo "##vso[task.prependpath]$HOME/.cargo/bin"
            displayName: Install uv

          - script: corepack enable
            displayName: Enable Corepack

          - script: corepack pnpm install --frozen-lockfile
            displayName: Install Node hook tooling

          - script: corepack pnpm run build
            displayName: Build package

          - publish: dist
            artifact: python-dist
            displayName: Publish build artifacts
