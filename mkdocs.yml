site_name: KiCad MCP Pro
site_url: https://oaslananka.github.io/kicad-mcp-pro
repo_url: https://github.com/oaslananka/kicad-mcp-pro
repo_name: oaslananka/kicad-mcp-pro
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Installation: installation.md
  - Client Configuration: client-configuration.md
  - Configuration: configuration.md
  - Tools Reference: tools-reference.md
  - KiCad 10:
      - Variants: kicad10/variants.md
      - Time-Domain Tuning: kicad10/time-domain.md
      - Graphical DRC: kicad10/graphical-drc.md
  - Integration:
      - KiCad Studio: integration/kicad-studio.md
      - Claude Desktop: integration/claude-desktop.md
      - Cursor: integration/cursor.md
      - Claude Code: integration/claude-code.md
  - Deployment:
      - Repository and CI/CD Topology: deployment/repository-topology.md
      - Azure DevOps CI/CD: deployment/azure-devops.md
      - Docker: deployment/docker.md
      - HTTP Mode: deployment/http-mode.md
      - Security: deployment/security.md
  - Workflows:
      - First PCB: workflows/first-pcb.md
      - Schematic to PCB: workflows/schematic-to-pcb.md
      - High-Speed Review: workflows/high-speed-review.md
      - Manufacturing Export: workflows/manufacturing-export.md
  - Development:
      - Contributing: development/contributing.md
      - Architecture: development/architecture.md
      - v2 Migration: development/v2-migration.md
