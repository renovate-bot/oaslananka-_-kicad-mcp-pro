name: kicad-mcp-pro
display_name: "KiCad MCP Pro"
displayName: KiCad MCP Pro Server
description: >
  Professional Model Context Protocol server for KiCad EDA with project setup,
  PCB editing, schematic tooling, validation, and manufacturing exports.
version: "2.3.0"
category: "Engineering / EDA"
icon: https://raw.githubusercontent.com/oaslananka/kicad-mcp-pro/main/docs/assets/icon.png
icon_url: "https://raw.githubusercontent.com/oaslananka/kicad-mcp-pro/main/docs/assets/icon.png"
categories:
  - engineering
  - eda
  - hardware-design
  - productivity
tags:
  - kicad
  - pcb
  - schematic
  - electronics
  - gerber
  - hardware
screenshots:
  - url: "https://raw.githubusercontent.com/oaslananka/kicad-mcp-pro/main/docs/assets/icon.png"
    alt: "First PCB workflow"
  - url: "https://raw.githubusercontent.com/oaslananka/kicad-mcp-pro/main/docs/assets/icon.png"
    alt: "Manufacturing export"
license: MIT
author:
  name: Osman Aslan
  github: oaslananka
repository: https://github.com/oaslananka/kicad-mcp-pro
documentation: https://oaslananka.github.io/kicad-mcp-pro
install:
  command: "uvx kicad-mcp-pro"
  environment:
    KICAD_MCP_PROJECT_DIR:
      required: true
      description: "Absolute path to your KiCad project directory"
    KICAD_MCP_PROFILE:
      required: false
      default: "full"
      description: "Server profile: full, pcb_only, schematic_only, high_speed, power, simulation"
startCommand:
  type: stdio
  command: uvx
  args: ["kicad-mcp-pro"]
config:
  - key: KICAD_MCP_PROJECT_DIR
    description: Path to your KiCad project directory
    required: false
    type: string
  - key: KICAD_MCP_KICAD_CLI
    description: Path to kicad-cli (auto-detected if omitted)
    required: false
    type: string
  - key: KICAD_MCP_PROFILE
    description: Server profile (full, minimal, pcb, schematic, manufacturing)
    required: false
    type: string
requirements:
  - name: KiCad
    version: ">=9.0"
    url: https://www.kicad.org/download/
    notes: KiCad must be installed. For IPC tools, keep KiCad open or enable headless use.
  - name: Python
    version: ">=3.12"
